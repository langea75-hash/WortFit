<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#2563eb">
<title>WortFit One 1.1</title>
<style>
:root {
  --bg:#eef3f8; --card:#fff; --text:#172033; --muted:#64748b;
  --primary:#2563eb; --primary2:#1d4ed8; --good:#15803d; --warn:#b45309;
  --border:#dbe3ee;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:760px;margin:auto;padding:18px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
h1{font-size:clamp(28px,6vw,42px);margin:0}
.badge{background:#dbeafe;color:#1e40af;padding:8px 12px;border-radius:999px;font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.07)}
.image{width:100%;max-width:420px;margin:0 auto 12px}
.image svg{width:100%;height:auto;display:block}
.word{font-size:clamp(34px,9vw,58px);font-weight:800;text-align:center;margin:8px 0 16px}
.instruction{font-size:20px;font-weight:700;margin:8px 0}
.wait{display:flex;gap:8px;align-items:center;color:var(--muted);margin-bottom:12px}
textarea{width:100%;min-height:112px;border:2px solid var(--border);border-radius:16px;padding:14px;font-size:20px;resize:vertical}
textarea:focus{outline:3px solid #bfdbfe;border-color:var(--primary)}
.buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
button{border:0;border-radius:15px;padding:14px 12px;font-size:18px;font-weight:700;cursor:pointer}
.primary{background:var(--primary);color:white}
.primary:hover{background:var(--primary2)}
.secondary{background:#e2e8f0;color:#1e293b}
.good{background:#dcfce7;color:#166534}
.feedback{margin-top:14px;padding:14px;border-radius:15px;background:#f8fafc;border:1px solid var(--border);font-size:18px;line-height:1.45}
.example{display:none;margin-top:12px;padding:13px;border-radius:14px;background:#eff6ff;font-size:20px}
.stats{display:flex;justify-content:space-between;margin-top:14px;color:var(--muted);font-weight:700}
.small{font-size:14px;color:var(--muted);text-align:center;margin-top:14px}
@media (max-width:520px){.buttons{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>WortFit</h1>
  <div class="badge">One 1.1</div>
</header>

<section class="card">
  <div class="image" id="image"></div>
  <div class="word" id="word"></div>

  <div class="instruction">1. Satz bilden</div>
  <div class="wait">⏳ Klicken und kurz nachdenken</div>

  <button class="secondary" id="exampleBtn" style="width:100%">💬 Beispiel zeigen</button>
  <div class="example" id="example"></div>

  <div class="instruction" style="margin-top:18px">2. Satz schreiben oder sprechen</div>
  <textarea id="sentence" placeholder="Schreibe oder sprich deinen Satz ..."></textarea>

  <div class="buttons">
    <button class="primary" id="speakBtn">🎤 Sprechen</button>
    <button class="good" id="checkBtn">✓ Satz prüfen</button>
    <button class="secondary" id="readBtn">🔊 Vorlesen</button>
    <button class="secondary" id="nextBtn">Nächstes Wort →</button>
  </div>

  <div class="feedback" id="feedback">Bilde einen Satz mit dem Wort.</div>

  <div class="stats">
    <span>Bearbeitet: <b id="done">0</b></span>
    <span>Gut gelungen: <b id="goodCount">0</b></span>
  </div>
</section>
<div class="small">Funktioniert ohne Anmeldung. Die Auswertung läuft lokal im Browser.</div>
</div>

25 180 120 Q230 125 232 195Z\" fill=\"#60a5fa\"/>\n<circle cx=\"166\" cy=\"82\" r=\"4\" fill=\"#111827\"/><circle cx=\"194\" cy=\"82\" r=\"4\" fill=\"#111827\"/>\n<path d=\"M166 103 Q180 110 194 103\" fill=\"none\" stroke=\"#7c2d12\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n    <text x=\"180\" y=\"220\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\" font-size=\"28\" font-weight=\"700\" fill=\"#1f2937\">Mann</text>\n    </svg>"}, {"word": "Kind", "example": "Das Kind spielt mit dem Ball.", "svg": "<svg viewBox=\"0 0 360 240\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Kind\">\n    <rect width=\"360\" height=\"240\" rx=\"26\" fill=\"#f8fafc\"/>\n    \n<circle cx=\"180\" cy=\"86\" r=\"34\" fill=\"#f2c29f\"/>\n<path d=\"M148 78 Q155 48 180 48 Q205 48 212 78 Q185 63 148 78Z\" fill=\"#a16207\"/>\n<path d=\"M137 195 Q140 125 180 122 Q220 125 223 195Z\" fill=\"#34d399\"/>\n<circle cx=\"168\" cy=\"86\" r=\"4\" fill=\"#111827\"/><circle cx=\"192\" cy=\"86\" r=\"4\" fill=\"#111827\"/>\n<path d=\"M167 104 Q180 115 193 104\" fill=\"none\" stroke=\"#9f1239\" stroke-width=\"4\" stroke-linecap=\"round\"/>\n<circle cx=\"270\" cy=\"155\" r=\"28\" fill=\"#f97316\"/>\n    <text x=\"180\" y=\"220\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\" font-size=\"28\" font-weight=\"700\" fill=\"#1f2937\">Kind</text>\n    </svg>"}, {"word": "Arzt", "example": "Der Arzt untersucht den Patienten.", "svg": "<svg viewBox=\"0 0 360 240\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Arzt\">\n    <rect width=\"360\" height=\"240\" rx=\"26\" fill=\"#f8fafc\"/>\n    \n<circle cx=\"180\" cy=\"72\" r=\"34\" fill=\"#e0b18b\"/>\n<path d=\"M145 62 Q152 35 180 35 Q208 35 215 62\" fill=\"#4b5563\"/>\n<path d=\"M120 198 Q125 118 180 113 Q235 118 240 198Z\" fill=\"#ffffff\" stroke=\"#cbd5e1\" stroke-width=\"4\"/>\n<path d=\"M180 113 V198\" stroke=\"#cbd5e1\" stroke-width=\"4\"/>\n<path d=\"M155 120 Q140 155 160 170 Q180 185 200 170 Q220 155 205 120\" fill=\"none\" stroke=\"#475569\" stroke-width=\"5\"/>\n<circle cx=\"160\" cy=\"171\" r=\"8\" fill=\"#64748b\"/>\n    <text x=\"180\" y=\"220\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\" font-size=\"28\" font-weight=\"700\" fill=\"#1f2937\">Arzt</text>\n    </svg>"}, {"word": "Ball", "example": "Der Ball liegt auf dem Boden.", "svg": "<svg viewBox=\"0 0 360 240\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Ball\">\n    <rect width=\"360\" height=\"240\" rx=\"26\" fill=\"#f8fafc\"/>\n    \n<circle cx=\"180\" cy=\"125\" r=\"70\" fill=\"#ffffff\" stroke=\"#1f2937\" stroke-width=\"6\"/>\n<polygon points=\"180,88 205,105 196,135 164,135 155,105\" fill=\"#1f2937\"/>\n<path d=\"M180 55 L180 88 M113 91 L155 105 M247 91 L205 105 M136 184 L164 135 M224 184 L196 135\" stroke=\"#1f2937\" stroke-width=\"6\"/>\n    <text x=\"180\" y=\"220\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\" font-size=\"28\" font-weight=\"700\" fill=\"#1f2937\">Ball</text>\n    </svg>"}, {"word": "Tasse", "example": "Die Tasse steht auf dem Tisch.", "svg": "<svg viewBox=\"0 0 360 240\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Tasse\">\n    <rect width=\"360\" height=\"240\" rx=\"26\" fill=\"#f8fafc\"/>\n    \n<rect x=\"105\" y=\"80\" width=\"135\" height=\"100\" rx=\"18\" fill=\"#f1f5f9\" stroke=\"#64748b\" stroke-width=\"5\"/>\n<path d=\"M240 105 Q292 102 286 142 Q280 173 240 162\" fill=\"none\" stroke=\"#64748b\" stroke-width=\"10\"/>\n<path d=\"M140 66 Q126 42 145 25 M180 66 Q166 40 183 22 M220 66 Q205 43 223 25\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n    <text x=\"180\" y=\"220\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\" font-size=\"28\" font-weight=\"700\" fill=\"#1f2937\">Tasse</text>\n    </svg>"}, {"word": "Schlüssel", "example": "Der Schlüssel liegt neben der Tür.", "svg": "<svg viewBox=\"0 0 360 240\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Schlüssel\">\n    <rect width=\"360\" height=\"240\" rx=\"26\" fill=\"#f8fafc\"/>\n    \n<circle cx=\"120\" cy=\"115\" r=\"42\" fill=\"none\" stroke=\"#f59e0b\" stroke-width=\"18\"/>\n<line x1=\"150\" y1=\"145\" x2=\"255\" y2=\"185\" stroke=\"#f59e0b\" stroke-width=\"18\" stroke-linecap=\"round\"/>\n<line x1=\"220\" y1=\"171\" x2=\"238\" y2=\"145\" stroke=\"#f59e0b\" stroke-width=\"14\"/>\n<line x1=\"245\" y1=\"181\" x2=\"262\" y2=\"158\" stroke=\"#f59e0b\" stroke-width=\"14\"/>\n    <text x=\"180\" y=\"220\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\" font-size=\"28\" font-weight=\"700\" fill=\"#1f2937\">Schlüssel</text>\n    </svg>"}, {"word": "Telefon", "example": "Das Telefon klingelt laut.", "svg": "<svg viewBox=\"0 0 360 240\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Telefon\">\n    <rect width=\"360\" height=\"240\" rx=\"26\" fill=\"#f8fafc\"/>\n    \n<rect x=\"125\" y=\"45\" width=\"110\" height=\"150\" rx=\"20\" fill=\"#1f2937\"/>\n<rect x=\"137\" y=\"62\" width=\"86\" height=\"105\" rx=\"8\" fill=\"#dbeafe\"/>\n<circle cx=\"180\" cy=\"181\" r=\"8\" fill=\"#94a3b8\"/>\n<path d=\"M145 100 Q180 75 215 100 Q205 135 180 145 Q155 135 145 100Z\" fill=\"#22c55e\"/>\n<path d=\"M168 102 Q174 117 189 124\" fill=\"none\" stroke=\"#fff\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n    <text x=\"180\" y=\"220\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\" font-size=\"28\" font-weight=\"700\" fill=\"#1f2937\">Telefon</text>\n    </svg>"}, {"word": "Bett", "example": "Das Bett steht im Schlafzimmer.", "svg": "<svg viewBox=\"0 0 360 240\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Bett\">\n    <rect width=\"360\" height=\"240\" rx=\"26\" fill=\"#f8fafc\"/>\n    \n<rect x=\"70\" y=\"120\" width=\"220\" height=\"65\" rx=\"8\" fill=\"#60a5fa\"/>\n<rect x=\"70\" y=\"78\" width=\"28\" height=\"108\" rx=\"8\" fill=\"#475569\"/>\n<rect x=\"98\" y=\"95\" width=\"90\" height=\"42\" rx=\"18\" fill=\"#f8fafc\"/>\n<rect x=\"188\" y=\"95\" width=\"102\" height=\"42\" rx=\"8\" fill=\"#bfdbfe\"/>\n<rect x=\"88\" y=\"185\" width=\"12\" height=\"20\" fill=\"#475569\"/><rect x=\"265\" y=\"185\" width=\"12\" height=\"20\" fill=\"#475569\"/>\n    <text x=\"180\" y=\"220\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\" font-size=\"28\" font-weight=\"700\" fill=\"#1f2937\">Bett</text>\n    </svg>"}];
let index = Number(localStorage.getItem("wortfit_index") || 0) % items.length;
let done = Number(localStorage.getItem("wortfit_done") || 0);
let good = Number(localStorage.getItem("wortfit_good") || 0);

const el = id => document.getElementById(id);
const wordEl=el("word"), imageEl=el("image"), exEl=el("example"), sentEl=el("sentence"), fbEl=el("feedback");

function render() {
  const item=items[index];
  wordEl.textContent=item.word;
  imageEl.innerHTML=item.svg;
  exEl.textContent="Beispiel: "+item.example;
  exEl.style.display="none";
  sentEl.value="";
  fbEl.textContent="Bilde einen Satz mit dem Wort.";
  localStorage.setItem("wortfit_index", index);
  el("done").textContent=done;
  el("goodCount").textContent=good;
}

function normalize(s) {
  return s.toLocaleLowerCase("de-DE").replace(/[.,!?;:]/g," ").replace(/\s+/g," ").trim();
}

const commonVerbs = [
"bin","bist","ist","sind","seid","war","waren","habe","hast","hat","haben",
"gehe","geht","gehen","fahre","fährt","fahren","läuft","laufen","sitzt","sitzen",
"steht","stehen","liegt","liegen","esse","isst","essen","trinke","trinkt","trinken",
"spiele","spielt","spielen","kaufe","kauft","kaufen","lese","liest","lesen",
"fliegt","fliegen","kommt","kommen","klingelt","untersucht","wächst","wachsen"
];

function polish(s) {
  s=s.trim().replace(/\s+/g," ");
  if(!s) return "";
  s=s.charAt(0).toLocaleUpperCase("de-DE")+s.slice(1);
  if(!/[.!?]$/.test(s)) s+=".";
  return s;
}

function checkSentence() {
  const raw=sentEl.value.trim();
  if(!raw) {
    fbEl.innerHTML="Bitte zuerst einen Satz schreiben oder sprechen.";
    return;
  }
  const text=normalize(raw);
  const current=normalize(items[index].word);
  const words=text.split(" ").filter(Boolean);
  const hasTarget=text.includes(current);
  const hasVerb=commonVerbs.some(v=>words.includes(v)) || words.some(w=>/(en|t|st)$/.test(w) && w.length>3);
  const longEnough=words.length>=3;
  let score=[hasTarget,hasVerb,longEnough].filter(Boolean).length;

  done++;
  if(score===3) {
    good++;
    fbEl.innerHTML="✅ Sehr gut! Der Satz ist verständlich.<br><b>"+polish(raw)+"</b>";
  } else {
    let tips=[];
    if(!hasTarget) tips.push("Benutze das Wort „"+items[index].word+"“.");
    if(!hasVerb) tips.push("Füge ein Verb hinzu.");
    if(!longEnough) tips.push("Der Satz darf etwas länger sein.");
    fbEl.innerHTML="👍 Gute Idee. "+tips.join(" ")+"<br><b>Vorschlag: "+items[index].example+"</b>";
  }
  localStorage.setItem("wortfit_done",done);
  localStorage.setItem("wortfit_good",good);
  el("done").textContent=done;
  el("goodCount").textContent=good;
}

function speakText(text) {
  if(!("speechSynthesis" in window)) {
    fbEl.textContent="Vorlesen wird in diesem Browser leider nicht unterstützt.";
    return;
  }
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="de-DE";
  u.rate=0.9;
  speechSynthesis.speak(u);
}

el("exampleBtn").onclick=()=> {
  exEl.style.display=exEl.style.display==="block"?"none":"block";
};
el("checkBtn").onclick=checkSentence;
el("readBtn").onclick=()=>speakText(sentEl.value.trim() || items[index].example);
el("nextBtn").onclick=()=>{index=(index+1)%items.length; render();};

el("speakBtn").onclick=()=> {
  const SR=window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) {
    fbEl.textContent="Spracheingabe wird in diesem Browser nicht unterstützt. Chrome auf Android oder Chromebook funktioniert meist.";
    return;
  }
  const r=new SR();
  r.lang="de-DE";
  r.interimResults=false;
  r.maxAlternatives=1;
  fbEl.textContent="🎤 Ich höre zu ...";
  r.onresult=e=>{
    sentEl.value=e.results[0][0].transcript;
    fbEl.textContent="Sprache erkannt. Jetzt den Satz prüfen.";
  };
  r.onerror=()=>fbEl.textContent="Die Sprache wurde nicht erkannt. Bitte noch einmal versuchen.";
  r.start();
};

render();
</script>
