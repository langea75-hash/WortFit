<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WortFit</title>
<link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #222;
      text-align: center;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 25px 15px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
    }

    main {
      max-width: 750px;
      margin: 20px auto;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      margin: 15px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.12);
    }

    button {
      font-size: 22px;
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 14px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .gray {
      background: #64748b;
    }

    .green {
      background: #16a34a;
    }

    img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 18px;
      margin: 20px 0;
      object-fit: contain;
    }

    .hidden {
      display: none;
    }

    .timer {
      font-size: 60px;
      font-weight: bold;
      color: #dc2626;
      margin: 20px;
    }

    .word {
      font-size: 42px;
      font-weight: bold;
      margin: 20px;
      color: #111827;
    }

    input {
      font-size: 22px;
      padding: 14px;
      width: 90%;
      max-width: 500px;
      border-radius: 12px;
      border: 1px solid #bbb;
    }

    .small {
      color: #666;
      font-size: 18px;
    }
  </style>
</head>

<body>

<header>
  <h1>🧠 WortFit</h1>
  <p>Wörter finden. Sätze bilden. Fortschritte sehen.</p>
</header>

<main>

  <section id="home" class="card">
    <h2>Start</h2>
    <button onclick="startExercise()">▶️ Übung starten</button>
    <button onclick="showStats()" class="gray">📊 Fortschritt</button>
  </section>

  <section id="exercise" class="card hidden">
    <h2>🎯 Übung</h2>

    <img id="image" src="" alt="Bild">

    <div id="timer" class="timer">8</div>

    <div id="wordBox" class="hidden">
      <div id="word" class="word"></div>
      <button onclick="speakWord()">🔊 Wort langsam hören</button>
    </div>

    <div id="sentenceBox" class="hidden">
      <h3>🗣️ Satz bilden</h3>
      <input id="sentence" placeholder="Schreibe deinen Satz hier...">
      <br>
      <button onclick="saveResult()" class="green">✅ Speichern</button>
    </div>

    <button onclick="nextCard()">➡️ Nächstes Wort</button>
    <button onclick="goHome()" class="gray">🏠 Start</button>
  </section>

  <section id="stats" class="card hidden">
    <h2>📊 Fortschritt</h2>
    <div id="statsText"></div>
    <button onclick="goHome()" class="gray">🏠 Zurück</button>
  </section>

</main>

<script>
  const cards = [
    {
      word: "Apfel",
      image: "https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg"
    },
    {
      word: "Fahrrad",
      image: "https://upload.wikimedia.org/wikipedia/commons/4/41/Left_side_of_Flying_Pigeon.jpg"
    },
    {
      word: "Hund",
      image: "https://upload.wikimedia.org/wikipedia/commons/6/6e/Golde33443.jpg"
    },
    {
      word: "Brot",
      image: "https://upload.wikimedia.org/wikipedia/commons/3/33/Fresh_made_bread_05.jpg"
    },
    {
      word: "Haus",
      image: "https://upload.wikimedia.org/wikipedia/commons/6/6f/House_in_Kaiserswerth.jpg"
    }
  ];

  let currentCard = null;
  let timer = 8;
  let interval = null;

  function hideAll() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("exercise").classList.add("hidden");
    document.getElementById("stats").classList.add("hidden");
  }

  function goHome() {
    hideAll();
    document.getElementById("home").classList.remove("hidden");
  }

  function startExercise() {
    hideAll();
    document.getElementById("exercise").classList.remove("hidden");
    nextCard();
  }

  function nextCard() {
    currentCard = cards[Math.floor(Math.random() * cards.length)];

    document.getElementById("image").src = currentCard.image;
    document.getElementById("word").textContent = currentCard.word;
    document.getElementById("sentence").value = "";

    document.getElementById("wordBox").classList.add("hidden");
    document.getElementById("sentenceBox").classList.add("hidden");

    startTimer();
  }

  function startTimer() {
    clearInterval(interval);
    timer = 8;
    document.getElementById("timer").textContent = timer;

    interval = setInterval(() => {
      timer--;
      document.getElementById("timer").textContent = timer;

      if (timer <= 0) {
        clearInterval(interval);
        document.getElementById("timer").textContent = "⏰";
        showWord();
      }
    }, 1000);
  }

  function showWord() {
    document.getElementById("wordBox").classList.remove("hidden");
    document.getElementById("sentenceBox").classList.remove("hidden");
    speakWord();
  }

  function speakWord() {
    const text = new SpeechSynthesisUtterance(currentCard.word);
    text.lang = "de-DE";
    text.rate = 0.55;
    speechSynthesis.cancel();
    speechSynthesis.speak(text);
  }

  function saveResult() {
    const sentence = document.getElementById("sentence").value.trim();

    const result = {
      date: new Date().toLocaleString("de-DE"),
      word: currentCard.word,
      sentence: sentence
    };

    const results = JSON.parse(localStorage.getItem("wortfit") || "[]");
    results.push(result);
    localStorage.setItem("wortfit", JSON.stringify(results));

    alert("✅ Gespeichert");
  }

  function showStats() {
    hideAll();
    document.getElementById("stats").classList.remove("hidden");

    const results = JSON.parse(localStorage.getItem("wortfit") || "[]");

    if (results.length === 0) {
      document.getElementById("statsText").innerHTML = "Noch keine Übungen gespeichert.";
      return;
    }

    let html = `<p>🧠 Übungen insgesamt: ${results.length}</p>`;
    html += "<h3>Letzte Übungen:</h3>";

    results.slice(-5).reverse().forEach(r => {
      html += `<p>✅ ${r.date}<br><b>${r.word}</b><br>${r.sentence || "Kein Satz"}</p>`;
    });

    document.getElementById("statsText").innerHTML = html;
  }
</script>

</body>
</html>
