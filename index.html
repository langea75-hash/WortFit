<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#4f46e5">
  <title>WortFit 6.1</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <h1>🧠 WortFit 6.1</h1>
  <p>Bild sehen. Wort finden. Satz bilden.</p>
</header>

<main>
  <section id="home" class="screen card">
    <h2>Start</h2>
    <div id="homeProgress" class="progress-box"></div>
    <button class="primary" type="button" onclick="startExercise()">▶️ Übung starten</button>
    <button class="secondary" type="button" onclick="showSettings()">⚙️ Einstellungen</button>
    <button class="secondary" type="button" onclick="showStats()">📊 Fortschritt</button>
    <button class="secondary" type="button" onclick="showFavorites()">⭐ Favoriten</button>
  </section>

  <section id="settings" class="screen card hidden">
    <h2>⚙️ Einstellungen</h2>

    <label for="timeSelect">Bedenkzeit</label>
    <select id="timeSelect">
      <option value="5">5 Sekunden</option>
      <option value="8" selected>8 Sekunden</option>
      <option value="10">10 Sekunden</option>
      <option value="15">15 Sekunden</option>
    </select>

    <label for="categorySelect">Kategorie</label>
    <select id="categorySelect">
      <option value="Alle">Alle Kategorien</option>
    </select>

    <label for="dailyGoal">Tagesziel</label>
    <select id="dailyGoal">
      <option value="5">5 Wörter</option>
      <option value="10" selected>10 Wörter</option>
      <option value="20">20 Wörter</option>
      <option value="30">30 Wörter</option>
    </select>

    <label for="speechRate">Sprechgeschwindigkeit</label>
    <select id="speechRate">
      <option value="0.45">Sehr langsam</option>
      <option value="0.55" selected>Langsam</option>
      <option value="0.7">Normal</option>
    </select>

    <label class="check-row">
      <input type="checkbox" id="autoSpeak" checked>
      <span>Wort automatisch vorlesen</span>
    </label>

    <label class="check-row">
      <input type="checkbox" id="favoritesOnly">
      <span>Nur Favoriten üben</span>
    </label>

    <button class="success" type="button" onclick="saveSettings()">✅ Speichern</button>
    <button class="secondary" type="button" onclick="goHome()">🏠 Zurück</button>
  </section>

  <section id="exercise" class="screen card hidden">
    <div class="exercise-top">
      <h2>🎯 Übung</h2>
      <span id="categoryBadge" class="badge">Kategorie</span>
    </div>

    <div class="image-card">
      <img id="wordImage" alt="Übungsbild ohne eingeblendetes Wort">
    </div>

    <div id="timer" class="timer" aria-live="polite">8</div>

    <div id="wordArea" class="hidden">
      <div id="wordText" class="word"></div>
      <div id="syllablesText" class="syllables"></div>
      <button class="primary" type="button" onclick="speakWord()">🔊 Wort langsam hören</button>
    </div>

    <div id="sentenceArea" class="hidden">
      <h3>🗣️ Satz bilden</h3>

      <button id="exampleButton" class="example-button" type="button" onclick="showExample()">
        💬 Beispiel anzeigen
      </button>

      <div id="exampleText" class="example hidden"></div>

      <input id="sentenceInput"
             type="text"
             autocomplete="off"
             placeholder="Satz schreiben oder sprechen …">

      <button class="secondary" type="button" onclick="startSpeechRecognition()">🎤 Satz sprechen</button>
      <button id="favoriteButton" class="secondary" type="button" onclick="toggleFavorite()">☆ Favorit</button>
      <button class="success" type="button" onclick="saveResult()">✅ Speichern</button>

      <div id="feedback" class="feedback hidden" aria-live="polite"></div>
    </div>

    <button class="primary" type="button" onclick="nextCard()">➡️ Nächstes Wort</button>
    <button class="secondary" type="button" onclick="goHome()">🏠 Start</button>
  </section>

  <section id="stats" class="screen card hidden">
    <h2>📊 Fortschritt</h2>
    <div id="statsContent"></div>
    <button class="danger" type="button" onclick="clearStats()">🗑️ Statistik löschen</button>
    <button class="secondary" type="button" onclick="goHome()">🏠 Zurück</button>
  </section>

  <section id="favorites" class="screen card hidden">
    <h2>⭐ Favoriten</h2>
    <div id="favoritesContent"></div>
    <button class="secondary" type="button" onclick="goHome()">🏠 Zurück</button>
  </section>
</main>

<footer>WortFit 6.1 · Browser-Version</footer>

<script src="data.js"></script>
<script src="storage.js"></script>
<script src="speech.js"></script>
<script src="stats.js"></script>
<script src="app.js"></script>
</body>
</html>
