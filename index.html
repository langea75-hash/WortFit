<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WortFit</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #222;
      text-align: center;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 25px 15px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
    }

    .subtitle {
      font-size: 18px;
      margin-top: 8px;
    }

    main {
      max-width: 700px;
      margin: 20px auto;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 25px;
      margin: 15px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    button {
      font-size: 22px;
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 14px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #64748b;
    }

    button.success {
      background: #16a34a;
    }

    select, input {
      font-size: 20px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin: 8px;
      width: 80%;
      max-width: 400px;
    }

    img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 16px;
      margin: 15px 0;
      object-fit: contain;
    }

    .hidden {
      display: none;
    }

    .timer {
      font-size: 52px;
      font-weight: bold;
      color: #dc2626;
    }

    .word {
      font-size: 40px;
      font-weight: bold;
      margin: 15px;
    }

    .sentence-box {
      font-size: 22px;
      min-height: 60px;
      padding: 15px;
      border-radius: 12px;
      background: #eef2ff;
      margin-top: 15px;
    }

    .stats {
      font-size: 22px;
      line-height: 1.8;
      text-align: left;
    }

    footer {
      margin: 30px;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>🧠 WortFit</h1>
  <div class="subtitle">Wörter finden. Sätze bilden. Fortschritte sehen.</div>
</header>

<main>

  <section id="home" class="card">
    <h2>Start</h2>
    <button onclick="startExercise()">▶️ Übung starten</button>
    <button onclick="showStats()" class="secondary">📊 Fortschritt</button>
    <button onclick="showSettings()" class="secondary">⚙️ Einstellungen</button>
  </section>

  <section id="settings" class="card hidden">
    <h2>⚙️ Einstellungen</h2>

    <label>⏱️ Zeit zum Finden:</label><br>
    <select id="timeSelect">
      <option value="5">5 Sekunden</option>
      <option value="8" selected>8 Sekunden</option>
      <option value="10">10 Sekunden</option>
    </select>

    <br><br>

    <label>📂 Kategorie:</label><br>
    <select id="categorySelect">
      <option value="Alle">Alle</option>
      <option value="Alltag">Alltag</option>
      <option value="Essen">Essen</option>
      <option value="Freizeit">Freizeit</option>
      <option value="Tiere">Tiere</option>
      <option value="Gefühle">Gefühle</option>
    </select>

    <br>
    <button onclick="goHome()" class="success">✅ Speichern</button>
  </section>

  <section id="exercise" class="card hidden">
    <h2>🎯 Übung</h2>

    <div id="imageArea">
      <img id="exerciseImage" src="" alt="Übungsbild">
    </div>

    <div id="timer" class="timer"></div>

    <div id="wordArea" class="hidden">
      <div class="word" id="wordText"></div>
      <button onclick="speakWord()">🔊 Wort langsam anhören</button>
    </div>

    <div id="sentenceArea" class="hidden">
      <h3>🗣️ Bilde einen Satz mit dem Wort</h3>
      <input id="sentenceInput" placeholder="Dein Satz..." />
      <div>
        <button onclick="startSpeechRecognition()" class="secondary">🎤 Satz sprechen</button>
      </div>
      <div id="spokenText" class="sentence-box"></div>
    </div>

    <button onclick="saveResult()" class="success">✅ Fertig</button>
    <button onclick="nextCard()">➡️ Nächstes Wort</button>
    <button onclick="goHome()" class="secondary">🏠 Start</button>
  </section>

  <section id="stats" class="card hidden">
    <h2>📊 Fortschritt</h2>
    <div id="statsContent" class="stats"></div>
    <button onclick="clearStats()" class="secondary">🗑️ Statistik löschen</button>
    <button onclick="goHome()" class="success">🏠 Zurück</button>
  </section>

</main>

<footer>
  WortFit · Logopädie-App
</footer>

<script>
  const cards = [
    {
      word: "Fahrrad",
      category: "Freizeit",
      image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Left_side_of_Flying_Pigeon.jpg/640px-Left_side_of_Flying_Pigeon.jpg"
    },
    {
      word: "Apfel",
      category: "Essen",
      image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Red_Apple.jpg/640px-Red_Apple.jpg"
    },
    {
      word: "Hund",
      category: "Tiere",
      image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Golde33443.jpg/640px-Golde33443.jpg"
    },
    {
      word: "Brot",
      category: "Essen",
      image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Fresh_made_bread_05.jpg/640px-Fresh_made_bread_05.jpg"
    },
    {
      word: "Haus",
      category: "Alltag",
      image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/House_in_Kaiserswerth.jpg/640px-House_in_Kaiserswerth.jpg"
    },
    {
      word: "Lachen",
      category: "Gefühle",
      image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Portrait_Placeholder.png/480px-Portrait_Placeholder.png"
    }
  ];

  let currentCard = null;
  let countdown = 8;
  let timerInterval = null;

  function hideAll() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("settings").classList.add("hidden");
    document.getElementById("exercise").classList.add("hidden");
    document.getElementById("stats").classList.add("hidden");
  }

  function goHome() {
    hideAll();
    document.getElementById("home").classList.remove("hidden");
  }

  function showSettings() {
    hideAll();
    document.getElementById("settings").classList.remove("hidden");
  }

  function startExercise() {
    hideAll();
    document.getElementById("exercise").classList.remove("hidden");
    nextCard();
  }

  function nextCard() {
    const selectedCategory = document.getElementById("categorySelect").value;

    let filteredCards = cards;

    if (selectedCategory !== "Alle") {
      filteredCards = cards.filter(card => card.category === selectedCategory);
    }

    if (filteredCards.length === 0) {
      alert("Keine Karten in dieser Kategorie.");
      return;
    }

    currentCard = filteredCards[Math.floor(Math.random() * filteredCards.length)];

    document.getElementById("exerciseImage").src = currentCard.image;
    document.getElementById("wordText").textContent = currentCard.word;
    document.getElementById("wordArea").classList.add("hidden");
    document.getElementById("sentenceArea").classList.add("hidden");
    document.getElementById("sentenceInput").value = "";
    document.getElementById("spokenText").textContent = "";

    startCountdown();
  }

  function startCountdown() {
    clearInterval(timerInterval);

    countdown = parseInt(document.getElementById("timeSelect").value);
    document.getElementById("timer").textContent = countdown;

    timerInterval = setInterval(() => {
      countdown--;
      document.getElementById("timer").textContent = countdown;

      if (countdown <= 0) {
        clearInterval(timerInterval);
        document.getElementById("timer").textContent = "⏰";
        showWord();
      }
    }, 1000);
  }

  function showWord() {
    document.getElementById("wordArea").classList.remove("hidden");
    document.getElementById("sentenceArea").classList.remove("hidden");
    speakWord();
  }

  function speakWord() {
    if (!currentCard) return;

    const utterance = new SpeechSynthesisUtterance(currentCard.word);
    utterance.lang = "de-DE";
    utterance.rate = 0.55;
    utterance.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }

  function startSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("Spracherkennung wird von diesem Browser leider nicht unterstützt.");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "de-DE";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.start();

    recognition.onresult = function(event) {
      const text = event.results[0][0].transcript;
      document.getElementById("spokenText").textContent = text;
      document.getElementById("sentenceInput").value = text;
    };

    recognition.onerror = function() {
      alert("Spracherkennung hat nicht funktioniert.");
    };
  }

  function saveResult() {
    if (!currentCard) return;

    const sentence = document.getElementById("sentenceInput").value.trim();

    const result = {
      date: new Date().toLocaleString("de-DE"),
      word: currentCard.word,
      category: currentCard.category,
      sentence: sentence,
      sentenceDone: sentence.length > 0
    };

    const oldResults = JSON.parse(localStorage.getItem("wortfitResults") || "[]");
    oldResults.push(result);

    localStorage.setItem("wortfitResults", JSON.stringify(oldResults));

    alert("✅ Fortschritt gespeichert.");
  }

  function showStats() {
    hideAll();
    document.getElementById("stats").classList.remove("hidden");

    const results = JSON.parse(localStorage.getItem("wortfitResults") || "[]");

    const total = results.length;
    const sentences = results.filter(r => r.sentenceDone).length;

    let categoryCount = {};

    results.forEach(r => {
      categoryCount[r.category] = (categoryCount[r.category] || 0) + 1;
    });

    let categoryHtml = "";

    for (const cat in categoryCount) {
      categoryHtml += `📂 ${cat}: ${categoryCount[cat]}<br>`;
    }

    document.getElementById("statsContent").innerHTML = `
      🧠 Übungen insgesamt: ${total}<br>
      🗣️ Sätze gebildet: ${sentences}<br>
      <br>
      <strong>Kategorien:</strong><br>
      ${categoryHtml || "Noch keine Daten."}
      <br>
      <strong>Letzte Übungen:</strong><br>
      ${results.slice(-5).reverse().map(r => 
        `✅ ${r.date}: ${r.word} - ${r.sentence || "kein Satz"}`
      ).join("<br>")}
    `;
  }

  function clearStats() {
    if (confirm("Statistik wirklich löschen?")) {
      localStorage.removeItem("wortfitResults");
      showStats();
    }
  }
</script>

</body>
</html>
