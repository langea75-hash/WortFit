<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#4f46e5"><title>WortFit 2.0</title><link rel="stylesheet" href="style.css"><link rel="manifest" href="manifest.json"></head><body><header><h1>🧠 WortFit</h1><p>Wörter finden. Sätze bilden. Fortschritte sehen.</p></header><main><section id="home" class="card"><h2>Start</h2><button onclick="startExercise()">▶️ Übung starten</button><button class="secondary" onclick="showSettings()">⚙️ Einstellungen</button><button class="secondary" onclick="showStats()">📊 Fortschritt</button><button class="secondary" onclick="showFavorites()">⭐ Favoriten</button><button class="secondary" onclick="showCredits()">ℹ️ Bildnachweise</button></section><section id="settings" class="card hidden"><h2>⚙️ Einstellungen</h2><label>Zeit</label><select id="timeSelect"><option value="5">5 Sekunden</option><option value="8" selected>8 Sekunden</option><option value="10">10 Sekunden</option></select><label>Kategorie</label><select id="categorySelect"><option value="Alle">Alle Kategorien</option></select><label class="check"><input type="checkbox" id="autoSpeak" checked> Wort automatisch vorlesen</label><label class="check"><input type="checkbox" id="favoritesOnly"> Nur Favoriten üben</label><button class="success" onclick="saveSettings()">✅ Speichern</button><button class="secondary" onclick="goHome()">🏠 Zurück</button></section><section id="exercise" class="card hidden"><h2>🎯 Übung <span id="categoryBadge"></span></h2><div class="imageWrap"><div id="loading">Bild wird geladen …</div><img id="image" alt="Übungsbild"></div><div id="timer">8</div><div id="wordBox" class="hidden"><div id="word"></div><button onclick="speakWord()">🔊 Wort langsam hören</button></div><div id="sentenceBox" class="hidden"><h3>🗣️ Satz bilden</h3><input id="sentence" placeholder="Schreibe oder sprich deinen Satz …"><button class="secondary" onclick="startSpeechRecognition()">🎤 Satz sprechen</button><button class="secondary" onclick="toggleFavorite()">⭐ Favorit</button><button class="success" onclick="saveResult()">✅ Speichern</button><div id="feedback" class="feedback hidden"></div></div><button onclick="nextCard()">➡️ Nächstes Wort</button><button class="secondary" onclick="goHome()">🏠 Start</button></section><section id="stats" class="card hidden"><h2>📊 Fortschritt</h2><div id="statsText"></div><button class="danger" onclick="clearStats()">🗑️ Statistik löschen</button><button class="secondary" onclick="goHome()">🏠 Zurück</button></section><section id="favorites" class="card hidden"><h2>⭐ Favoriten</h2><div id="favoritesText"></div><button class="secondary" onclick="goHome()">🏠 Zurück</button></section><section id="credits" class="card hidden"><h2>ℹ️ Bildnachweise</h2><p>Die Angaben werden nach dem Laden eines Bildes gespeichert.</p><div id="creditsText"></div><button class="secondary" onclick="goHome()">🏠 Zurück</button></section></main><footer>WortFit 2.0 · Logopädie-App</footer><script src="data.js"></script><script src="app.js"></script></body></html>
