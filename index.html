<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WortFit 5.0</title><link rel="stylesheet" href="style.css"></head><body><header><h1>🧠 WortFit 5.0</h1><p>Wörter finden. Sätze bilden. Fortschritte sehen.</p></header><main>
<section id="home" class="screen card"><h2>Start</h2><div id="homeProgress" class="box"></div><button onclick="startExercise()">▶️ Übung starten</button><button class="secondary" onclick="showSettings()">⚙️ Einstellungen</button><button class="secondary" onclick="showStats()">📊 Fortschritt</button><button class="secondary" onclick="showFavorites()">⭐ Favoriten</button></section>
<section id="settings" class="screen card hidden"><h2>⚙️ Einstellungen</h2><label>Bedenkzeit</label><select id="timeSelect"><option value="5">5 Sekunden</option><option value="8" selected>8 Sekunden</option><option value="10">10 Sekunden</option></select><label>Kategorie</label><select id="categorySelect"><option value="Alle">Alle Kategorien</option></select><label>Tagesziel</label><select id="dailyGoal"><option>5</option><option selected>10</option><option>20</option><option>30</option></select><label><input type="checkbox" id="autoSpeak" checked> Wort automatisch vorlesen</label><label><input type="checkbox" id="favoritesOnly"> Nur Favoriten üben</label><button class="success" onclick="saveSettings()">✅ Speichern</button><button class="secondary" onclick="goHome()">🏠 Zurück</button></section>
<section id="exercise" class="screen card hidden"><h2>🎯 Übung</h2><span id="categoryBadge" class="badge"></span><div class="image-card"><img id="wordImage" alt=""></div><div id="timer" class="timer">8</div><div id="wordArea" class="hidden"><div id="wordText" class="word"></div><div id="syllablesText" class="syllables"></div><button onclick="speakWord()">🔊 Wort langsam hören</button></div><div id="sentenceArea" class="hidden"><h3>🗣️ Satz bilden</h3><div id="exampleText" class="example"></div><input id="sentenceInput" placeholder="Schreibe oder sprich deinen Satz …"><button class="secondary" onclick="startSpeechRecognition()">🎤 Satz sprechen</button><button class="secondary" onclick="toggleFavorite()">⭐ Favorit</button><button class="success" onclick="saveResult()">✅ Speichern</button><div id="feedback" class="feedback hidden"></div></div><button onclick="nextCard()">➡️ Nächstes Wort</button><button class="secondary" onclick="goHome()">🏠 Start</button></section>
<section id="stats" class="screen card hidden"><h2>📊 Fortschritt</h2><div id="statsContent"></div><button class="danger" onclick="clearStats()">🗑️ Statistik löschen</button><button class="secondary" onclick="goHome()">🏠 Zurück</button></section>
<section id="favorites" class="screen card hidden"><h2>⭐ Favoriten</h2><div id="favoritesContent"></div><button class="secondary" onclick="goHome()">🏠 Zurück</button></section>
</main><footer>WortFit 5.0 · Browser-Version</footer><script src="data.js"></script><script src="storage.js"></script><script src="speech.js"></script><script src="stats.js"></script><script src="app.js"></script></body></html>
