<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#4f46e5">
<title>WortFit 7.0</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>🧠 WortFit 7.0</h1><p>Bild sehen. Wort finden. Satz bilden.</p></header>
<main>
<section id="home" class="screen card">
<h2>Start</h2>
<div id="homeProgress" class="progress-box"></div>
<button onclick="startExercise()">▶️ Übung starten</button>
<button class="secondary" onclick="showSettings()">⚙️ Einstellungen</button>
<button class="secondary" onclick="showStats()">📊 Fortschritt</button>
<button class="secondary" onclick="showFavorites()">⭐ Favoriten</button>
</section>

<section id="settings" class="screen card hidden">
<h2>⚙️ Einstellungen</h2>
<label>Bedenkzeit</label>
<select id="timeSelect"><option value="5">5 Sekunden</option><option value="8" selected>8 Sekunden</option><option value="10">10 Sekunden</option><option value="15">15 Sekunden</option></select>
<label>Kategorie</label>
<select id="categorySelect"><option value="Alle">Alle Kategorien</option></select>
<label>Schwierigkeitsgrad</label>
<select id="difficultySelect"><option value="leicht">Leicht</option><option value="mittel" selected>Mittel</option><option value="schwer">Schwer</option></select>
<label>Tagesziel</label>
<select id="dailyGoal"><option value="5">5 Wörter</option><option value="10" selected>10 Wörter</option><option value="20">20 Wörter</option><option value="30">30 Wörter</option></select>
<label>Sprechgeschwindigkeit</label>
<select id="speechRate"><option value="0.45">Sehr langsam</option><option value="0.55" selected>Langsam</option><option value="0.7">Normal</option></select>
<label class="check"><input type="checkbox" id="autoSpeak" checked> Wort automatisch vorlesen</label>
<label class="check"><input type="checkbox" id="favoritesOnly"> Nur Favoriten üben</label>
<button class="success" onclick="saveSettings()">✅ Speichern</button>
<button class="secondary" onclick="goHome()">🏠 Zurück</button>
</section>

<section id="exercise" class="screen card hidden">
<h2>🎯 Übung</h2>
<span id="categoryBadge" class="badge"></span>
<div class="image-card"><img id="wordImage" alt="Bild für die Wortfindung"></div>
<div id="timer" class="timer">8</div>

<div id="wordArea" class="hidden">
<div id="articleText" class="article"></div>
<div id="wordText" class="word"></div>
<div id="syllablesText" class="syllables"></div>
<div class="button-row">
<button onclick="speakWord(.48)">🐢 Langsam hören</button>
<button onclick="speakWord(.7)">🔊 Normal hören</button>
</div>
</div>

<div id="sentenceArea" class="hidden">
<h3>🗣️ Satz bilden</h3>
<button id="exampleButton" class="example-button" onclick="showExamples()">💬 Beispiele anzeigen</button>
<div id="exampleBox" class="example hidden"></div>
<input id="sentenceInput" placeholder="Satz schreiben oder sprechen …">
<button class="secondary" onclick="startSpeechRecognition()">🎤 Satz sprechen</button>
<button id="favoriteButton" class="secondary" onclick="toggleFavorite()">☆ Favorit</button>
<button class="success" onclick="saveResult()">✅ Speichern</button>
<div id="feedback" class="feedback hidden"></div>
</div>

<button onclick="markDifficult()">🔁 Schwieriges Wort wiederholen</button>
<button onclick="nextCard()">➡️ Nächstes Wort</button>
<button class="secondary" onclick="goHome()">🏠 Start</button>
</section>

<section id="stats" class="screen card hidden">
<h2>📊 Fortschritt</h2>
<div id="statsContent"></div>
<button class="danger" onclick="clearStats()">🗑️ Statistik löschen</button>
<button class="secondary" onclick="goHome()">🏠 Zurück</button>
</section>

<section id="favorites" class="screen card hidden">
<h2>⭐ Favoriten</h2>
<div id="favoritesContent"></div>
<button class="secondary" onclick="goHome()">🏠 Zurück</button>
</section>
</main>
<footer>WortFit 7.0 · Browser-Version</footer>
<script src="data.js"></script>
<script src="storage.js"></script>
<script src="speech.js"></script>
<script src="stats.js"></script>
<script src="app.js"></script>
</body>
</html>
